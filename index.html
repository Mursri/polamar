<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polamar — Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --text-primary: #e8e8f0;
      --text-secondary: #7a7a9a;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle background gradient orbs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.12), transparent 70%);
      top: -200px;
      right: -100px;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 179, 255, 0.08), transparent 70%);
      bottom: -150px;
      left: -100px;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
    }

    .logo {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }

    .logo span {
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 2rem;
      border-radius: 2px;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .notify-form {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notify-form input[type="email"] {
      flex: 1;
      min-width: 220px;
      max-width: 300px;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input[type="email"]::placeholder {
      color: var(--text-secondary);
    }

    .notify-form input[type="email"]:focus {
      border-color: var(--accent);
    }

    .notify-form button {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .notify-form button:hover {
      opacity: 0.9;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .thanks {
      display: none;
      color: var(--accent);
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 1;
    }

    footer p {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin: 0;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Polamar <span>.Uk</span></div>
    <div class="divider"></div>
    <h1>Coming Soon</h1>
    <p>We're working on something great.<br>Sign up to be the first to know when we launch.</p>

    <form class="notify-form" id="notifyForm">
      <input type="email" id="emailInput" placeholder="your@email.com" required autocomplete="email">
      <button type="submit">Notify Me</button>
    </form>
    <p class="thanks" id="thanks">Thanks! We'll be in touch.</p>
  </div>

  <footer>
    <p>&copy; 2026 <a href="https://www.polamar.uk">polamar.uk</a> — All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('notifyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      this.style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    });
  </script>

</body>
</html>
